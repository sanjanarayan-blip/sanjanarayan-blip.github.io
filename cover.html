<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sanjana Rayan</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #FAE8C7;
      font-family: 'Inter', sans-serif;
      color: #561D25;
    }

    .bg {
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 25% 60%, rgba(86,29,37,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 20%, rgba(184,184,209,0.12) 0%, transparent 50%),
        #FAE8C7;
    }

    .stage {
      position: fixed; inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 8vw;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: up 0.7s ease 0.3s forwards;
    }

    .meta-tag {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(86,29,37,0.35);
    }

    .meta-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: rgba(86,29,37,0.2);
    }

    .name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 9vw, 7.5rem);
      font-weight: 400;
      color: #561D25;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 1.25rem;
      opacity: 0;
      animation: up 1s ease 0.5s forwards;
    }

    .logline {
      font-size: clamp(13px, 1.5vw, 16px);
      font-weight: 300;
      color: rgba(86,29,37,0.5);
      max-width: 420px;
      line-height: 1.7;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: up 0.8s ease 0.8s forwards;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 1rem;
      opacity: 0;
      animation: up 0.7s ease 1s forwards;
    }

    .btn-play {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 11px 24px;
      background: #561D25;
      color: #FAE8C7;
      border: none;
      border-radius: 3px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .btn-play:hover { opacity: 0.82; text-decoration: none; }
    .btn-play svg { width: 13px; height: 13px; fill: #FAE8C7; flex-shrink: 0; }

    .btn-info {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 11px 24px;
      background: rgba(86,29,37,0.08);
      color: #561D25;
      border: none;
      border-radius: 3px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.04em;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn-info:hover { background: rgba(86,29,37,0.13); text-decoration: none; }
    .btn-info svg { width: 16px; height: 16px; stroke: #561D25; fill: none; stroke-width: 1.5; flex-shrink: 0; }

    .hint {
      position: fixed;
      bottom: 5.5rem;
      left: 8vw;
      z-index: 3;
      opacity: 0;
      animation: fadeIn 0.6s ease 1.6s forwards;
    }

    .hint-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(86,29,37,0.25);
      margin-bottom: 0.4rem;
    }

    .hint-next {
      font-size: 13px;
      color: rgba(86,29,37,0.45);
      font-weight: 300;
    }

    .hint-next strong {
      font-weight: 500;
      color: rgba(86,29,37,0.7);
    }

    .progress-wrap {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 3;
      padding: 0 0 1.5rem;
      opacity: 0;
      animation: fadeIn 0.6s ease 1.4s forwards;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      padding: 0 8vw 0.5rem;
    }

    .progress-ep {
      font-size: 11px;
      color: rgba(86,29,37,0.3);
      letter-spacing: 0.06em;
    }

    .progress-time {
      font-size: 11px;
      color: rgba(86,29,37,0.3);
    }

    .progress-bar {
      height: 2px;
      background: rgba(86,29,37,0.1);
      position: relative;
    }

    .progress-fill {
      height: 100%;
      width: 38%;
      background: rgba(86,29,37,0.3);
    }

    .progress-dot {
      position: absolute;
      top: 50%;
      left: 38%;
      transform: translate(-50%, -50%);
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #561D25;
    }

    .skip {
      position: fixed;
      top: 1.5rem; right: 2rem;
      z-index: 4;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(86,29,37,0.2);
      text-decoration: none;
      transition: color 0.2s;
      opacity: 0;
      animation: fadeIn 0.5s ease 2s forwards;
    }

    .skip:hover { color: rgba(86,29,37,0.5); }

    @keyframes up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn { to { opacity: 1; } }
  </style>
</head>
<body>

<div class="bg"></div>

<div class="stage">
  <div class="meta">
    <span class="meta-tag">2026</span>
    <div class="meta-dot"></div>
    <span class="meta-tag">Founder</span>
    <div class="meta-dot"></div>
    <span class="meta-tag">Engineer</span>
    <div class="meta-dot"></div>
    <span class="meta-tag">Researcher</span>
  </div>

  <h1 class="name">Sanjana Rayan</h1>

  <p class="logline">Chemical engineer who ended up building companies. Based in the Bay Area. Currently figuring out what's next.</p>

  <div class="actions">
    <a class="btn-play" href="index.html">
      <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
      Resume
    </a>
    <a class="btn-info" href="about.html">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="8" stroke-linecap="round" stroke-width="2"/><line x1="12" y1="12" x2="12" y2="16"/></svg>
      More Info
    </a>
  </div>
</div>

<div class="hint">
  <p class="hint-label">Next episode</p>
  <p class="hint-next"><strong>Orbitl</strong> &mdash; The Company</p>
</div>

<div class="progress-wrap">
  <div class="progress-meta">
    <span class="progress-ep">S1 · E1 &nbsp; About</span>
    <span class="progress-time">Paused</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill"></div>
    <div class="progress-dot"></div>
  </div>
</div>

<a class="skip" href="index.html">Skip intro</a>

</body>
</html>
